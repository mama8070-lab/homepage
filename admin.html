<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 | 최영미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:      #1a3a5c;
      --navy-dark: #0f2540;
      --gold:      #c8a96e;
      --white:     #ffffff;
      --gray-50:   #f8f9fb;
      --gray-100:  #f0f2f5;
      --gray-300:  #d1d5db;
      --gray-500:  #6b7280;
      --gray-700:  #374151;
      --green:     #10b981;
      --red:       #ef4444;
      --font: 'Noto Sans KR', sans-serif;
    }
    body { font-family: var(--font); background: var(--gray-50); color: var(--gray-700); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* ---- Login Screen ---- */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--navy-dark), var(--navy));
      gap: 32px;
    }
    .login-logo { font-size: 2rem; font-weight: 900; color: var(--white); letter-spacing: -1px; }
    .login-sub  { color: rgba(255,255,255,0.6); font-size: 0.95rem; margin-top: -20px; }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 340px;
    }
    .login-card h2 { font-size: 1.2rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
    .login-card p  { font-size: 0.85rem; color: var(--gray-500); margin-bottom: 28px; line-height: 1.6; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      background: var(--white);
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: var(--font);
      color: var(--gray-700);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-google:hover { border-color: var(--navy); box-shadow: 0 4px 16px rgba(26,58,92,0.12); }
    .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ---- Dashboard ---- */
    #dashboard { display: none; }

    .dash-header {
      background: var(--navy-dark);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .dash-header h1 { font-size: 1.1rem; font-weight: 700; color: var(--white); }
    .dash-header-right { display: flex; align-items: center; gap: 16px; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; color: var(--navy-dark);
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { font-size: 0.88rem; color: rgba(255,255,255,0.8); }
    .btn-logout {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px;
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: white; color: white; }

    .dash-body { max-width: 1200px; margin: 0 auto; padding: 36px 32px; }

    /* Stats cards */
    .dash-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 22px 24px;
      border: 1px solid var(--gray-100);
      box-shadow: 0 2px 12px rgba(26,58,92,0.06);
    }
    .stat-card .label { font-size: 0.78rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 900; color: var(--navy); line-height: 1; }
    .stat-card .sub   { font-size: 0.78rem; color: var(--gray-500); margin-top: 4px; }
    .stat-card.gold   { border-left: 4px solid var(--gold); }
    .stat-card.green  { border-left: 4px solid var(--green); }
    .stat-card.red    { border-left: 4px solid var(--red); }
    .stat-card.blue   { border-left: 4px solid #3b82f6; }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .filter-bar h2 { font-size: 1.1rem; font-weight: 700; color: var(--navy); }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 7px 16px;
      border-radius: 8px;
      border: 1.5px solid var(--gray-300);
      background: var(--white);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: var(--font);
      color: var(--gray-500);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab.active, .filter-tab:hover { border-color: var(--navy); color: var(--navy); background: var(--gray-50); }
    .filter-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

    /* Table */
    .table-wrap {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--gray-100);
      box-shadow: 0 2px 12px rgba(26,58,92,0.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--gray-50); border-bottom: 1.5px solid var(--gray-100); }
    th { padding: 14px 16px; text-align: left; font-size: 0.78rem; font-weight: 700; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--gray-100); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--gray-50); }
    td { padding: 14px 16px; font-size: 0.88rem; vertical-align: top; }
    td strong { display: block; color: var(--navy); font-weight: 600; margin-bottom: 2px; }
    td span.sub { font-size: 0.78rem; color: var(--gray-500); }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .status-pending  { background: #fef3c7; color: #92400e; }
    .status-done     { background: #d1fae5; color: #065f46; }
    .status-canceled { background: #fee2e2; color: #991b1b; }

    .action-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--gray-300);
      background: var(--white);
      font-size: 0.78rem;
      font-family: var(--font);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 4px;
    }
    .action-btn:hover { border-color: var(--navy); color: var(--navy); }
    .action-btn.done { border-color: var(--green); color: var(--green); }
    .action-btn.done:hover { background: var(--green); color: white; }
    .action-btn.cancel { border-color: var(--red); color: var(--red); }
    .action-btn.cancel:hover { background: var(--red); color: white; }

    /* Detail modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 36px;
      width: 520px;
      max-width: 92vw;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .modal h3 { font-size: 1.15rem; font-weight: 700; color: var(--navy); margin-bottom: 20px; }
    .modal-row { display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start; }
    .modal-label { font-size: 0.78rem; font-weight: 700; color: var(--gray-500); min-width: 70px; padding-top: 2px; text-transform: uppercase; }
    .modal-val { font-size: 0.92rem; color: var(--gray-700); flex: 1; line-height: 1.6; }
    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    .empty-state { padding: 60px 0; text-align: center; color: var(--gray-500); }
    .empty-state p { font-size: 0.92rem; margin-top: 8px; }

    #loadingSpinner { text-align: center; padding: 48px; color: var(--gray-500); font-size: 0.92rem; }

    @media (max-width: 900px) {
      .dash-stats { grid-template-columns: repeat(2, 1fr); }
      .dash-body { padding: 20px 16px; }
      .dash-header { padding: 0 16px; }
      table { font-size: 0.82rem; }
      td, th { padding: 10px 10px; }
    }
    @media (max-width: 600px) {
      .dash-stats { grid-template-columns: 1fr 1fr; }
      .filter-bar { flex-direction: column; align-items: flex-start; }
      .col-hide { display: none; }
    }
  </style>
</head>
<body>

  <!-- ========== LOGIN ========== -->
  <div id="loginScreen">
    <p class="login-logo">최영미</p>
    <p class="login-sub">관리자 전용 페이지</p>
    <div class="login-card">
      <h2>관리자 로그인</h2>
      <p>강의 의뢰 문의를 확인하고<br>관리하려면 로그인하세요.</p>
      <button class="btn-google" id="googleLoginBtn">
        <!-- Google G logo SVG -->
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google 계정으로 로그인
      </button>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div id="dashboard">
    <header class="dash-header">
      <h1>📋 강의 의뢰 관리</h1>
      <div class="dash-header-right">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <span class="user-name" id="userName"></span>
        </div>
        <button class="btn-logout" id="logoutBtn">로그아웃</button>
        <a href="index.html" class="btn-logout" style="text-decoration:none;">← 홈으로</a>
      </div>
    </header>

    <div class="dash-body">
      <!-- Stats -->
      <div class="dash-stats">
        <div class="stat-card gold">
          <div class="label">전체 문의</div>
          <div class="value" id="statTotal">-</div>
          <div class="sub">누적 강의 의뢰</div>
        </div>
        <div class="stat-card red">
          <div class="label">대기 중</div>
          <div class="value" id="statPending">-</div>
          <div class="sub">답변 필요</div>
        </div>
        <div class="stat-card green">
          <div class="label">완료</div>
          <div class="value" id="statDone">-</div>
          <div class="sub">처리 완료</div>
        </div>
        <div class="stat-card blue">
          <div class="label">이번 달</div>
          <div class="value" id="statMonth">-</div>
          <div class="sub">월간 신규</div>
        </div>
      </div>

      <!-- Table -->
      <div class="filter-bar">
        <h2>문의 목록</h2>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">전체</button>
          <button class="filter-tab" data-filter="pending">대기</button>
          <button class="filter-tab" data-filter="done">완료</button>
          <button class="filter-tab" data-filter="canceled">취소</button>
        </div>
      </div>

      <div class="table-wrap">
        <div id="loadingSpinner">불러오는 중...</div>
        <table id="inquiryTable" style="display:none">
          <thead>
            <tr>
              <th>기관 / 담당자</th>
              <th>연락처</th>
              <th class="col-hide">강의 분야</th>
              <th class="col-hide">희망 일정</th>
              <th>상태</th>
              <th>접수일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="inquiryBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none">
          <div style="font-size:2rem">📭</div>
          <p>해당 조건의 문의가 없습니다.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== DETAIL MODAL ========== -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent">
      <h3>문의 상세</h3>
      <div id="modalBody"></div>
      <div class="modal-footer">
        <button class="action-btn done"   id="modalDoneBtn">완료 처리</button>
        <button class="action-btn cancel" id="modalCancelBtn">취소 처리</button>
        <button class="action-btn"        id="modalCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
